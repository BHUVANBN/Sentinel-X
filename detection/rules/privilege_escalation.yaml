id: PE-001
name: Privilege Escalation Detected
description: >
  Detects when a non-root/non-admin process spawns a child process running as root/SYSTEM,
  indicating potential privilege escalation via exploit, misconfigured SUID binary,
  or other elevation control abuse.
mitre_technique: T1548
mitre_tactic: Privilege Escalation
severity: critical
confidence_base: 90

match:
  event_type: privilege_escalation
  category: process

aggregate:
  group_by: [pid]
  count_threshold: 1
  time_window_seconds: 60

response_actions:
  - type: kill_process
    target_field: pid
  - type: restrict_user
    target_field: user
  - type: notify
    message: "Privilege escalation: non-root process {parent_name} (PID:{parent_pid}) spawned root process {process_name} (PID:{pid})"
