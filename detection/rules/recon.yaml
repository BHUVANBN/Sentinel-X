id: RECON-001
name: Network Service Reconnaissance
description: Detecting port scanning activity from a single source.
mitre_tactic: Reconnaissance
mitre_technique: T1046
severity: low
confidence_base: 60
conditions:
  category: network
  event_type: network_connect
  window_seconds: 60
  threshold: 10
  unique_count_field: dest_port
  group_by: source_ip
response_actions:
  - type: notify
    message: Reconnaissance activity detected from source IP.
