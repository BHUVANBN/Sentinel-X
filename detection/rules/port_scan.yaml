id: PS-002
name: Network Port Scanning
description: >
  Detects a single source IP probing multiple distinct destination ports on a target
  system in a short time window, indicating network reconnaissance via port scanning.
mitre_technique: T1046
mitre_tactic: Discovery
severity: medium
confidence_base: 80

match:
  event_type: network_connect
  category: network

aggregate:
  group_by: [source_ip]
  unique_field: dest_port
  unique_threshold: 20
  time_window_seconds: 30

response_actions:
  - type: block_ip
    target_field: source_ip
  - type: notify
    message: "Port scan detected: {source_ip} probed {unique_count} ports in {time_window}s"
