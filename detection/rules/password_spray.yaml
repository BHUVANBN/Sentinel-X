id: PS-001
name: Password Spray Attack
description: >
  Detects failed login attempts across multiple distinct user accounts from the same
  source IP address, indicating a password spray attack where the attacker tries a
  common password against many accounts.
mitre_technique: T1110.003
mitre_tactic: Credential Access
severity: high
confidence_base: 80

match:
  event_type: login_failure
  category: authentication
  outcome: failure

aggregate:
  group_by: [source_ip]
  unique_field: user
  unique_threshold: 5
  time_window_seconds: 120

response_actions:
  - type: block_ip
    target_field: source_ip
  - type: notify
    message: "Password spray from {source_ip} — {unique_count} distinct users targeted in {time_window}s"
